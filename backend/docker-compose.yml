services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: presale
      POSTGRES_USER: presale
      POSTGRES_PASSWORD: presale
    ports: ["5432:5432"]

  valkey:
    image: valkey/valkey:7
    ports: ["6379:6379"]

  nats:
    image: nats:2-alpine
    command: ["--jetstream"]
    ports: ["4222:4222"]

  temporal:
    image: temporalio/auto-setup:latest
    ports: ["7233:7233"]
    depends_on: [postgres]

  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports: ["9000:9000", "9001:9001"]

  livekit:
    image: livekit/livekit-server:latest
    ports: ["7880:7880", "7881:7881"]
