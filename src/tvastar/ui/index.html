<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tvastar UI</title>
<style>
  :root {
    --bg: #0f1117; --bg2: #171923; --bg3: #1e2330;
    --border: #2d3347; --accent: #7c6af7; --accent2: #5a4fd4;
    --text: #e2e8f0; --muted: #64748b; --green: #22c55e;
    --yellow: #eab308; --red: #ef4444; --blue: #3b82f6;
    --tool-bg: #1a2235; --model-bg: #1a1f2e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; height: 100vh; display: flex; flex-direction: column; }

  /* Header */
  header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  .logo { font-size: 16px; font-weight: 700; color: var(--accent); letter-spacing: -0.3px; }
  .trace-path { color: var(--muted); font-size: 12px; font-family: monospace; }
  .stat-chips { display: flex; gap: 8px; margin-left: auto; }
  .chip { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px; font-size: 12px; color: var(--muted); }
  .chip span { color: var(--text); font-weight: 600; }
  .refresh-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--muted); border-radius: 6px; padding: 5px 12px; cursor: pointer; font-size: 12px; transition: all 0.15s; }
  .refresh-btn:hover { border-color: var(--accent); color: var(--text); }

  /* Layout */
  .layout { display: flex; flex: 1; overflow: hidden; }

  /* Run list */
  .run-list { width: 320px; flex-shrink: 0; border-right: 1px solid var(--border); overflow-y: auto; background: var(--bg2); }
  .run-list-header { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .run-item { padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
  .run-item:hover { background: var(--bg3); }
  .run-item.active { background: var(--bg3); border-left: 3px solid var(--accent); }
  .run-item-top { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
  .run-status { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .run-status.ok { background: var(--green); }
  .run-status.warn { background: var(--yellow); }
  .run-status.error { background: var(--red); }
  .run-agent { font-weight: 600; font-size: 13px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .run-time { font-size: 11px; color: var(--muted); }
  .run-meta { display: flex; gap: 10px; font-size: 11px; color: var(--muted); }
  .run-meta-item { display: flex; align-items: center; gap: 3px; }
  .empty-list { padding: 40px 20px; text-align: center; color: var(--muted); }

  /* Detail panel */
  .detail { flex: 1; overflow-y: auto; padding: 24px; }
  .detail-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--muted); gap: 10px; }
  .detail-empty .icon { font-size: 40px; opacity: 0.3; }

  /* Run header */
  .run-header { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; margin-bottom: 20px; }
  .run-header-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
  .run-title { font-size: 16px; font-weight: 700; }
  .run-id { font-family: monospace; font-size: 11px; color: var(--muted); margin-top: 3px; }
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .badge.ok { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge.warn { background: rgba(234,179,8,0.15); color: var(--yellow); }
  .badge.error { background: rgba(239,68,68,0.15); color: var(--red); }
  .run-stats { display: flex; gap: 20px; flex-wrap: wrap; }
  .run-stat { }
  .run-stat-label { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
  .run-stat-value { font-size: 15px; font-weight: 700; }

  /* Findings */
  .findings { margin-bottom: 16px; }
  .finding { background: rgba(234,179,8,0.08); border: 1px solid rgba(234,179,8,0.2); border-radius: 6px; padding: 8px 12px; margin-bottom: 6px; font-size: 12px; }
  .finding.error { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.2); }
  .finding-label { font-weight: 600; color: var(--yellow); margin-bottom: 2px; }
  .finding.error .finding-label { color: var(--red); }
  .finding-msg { color: var(--muted); }

  /* Timeline */
  .timeline-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
  .step { display: flex; gap: 12px; margin-bottom: 8px; }
  .step-connector { display: flex; flex-direction: column; align-items: center; width: 24px; flex-shrink: 0; }
  .step-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .step-dot.model { background: var(--accent); }
  .step-dot.tool { background: var(--blue); }
  .step-dot.tool.error { background: var(--red); }
  .step-dot.event { background: var(--muted); }
  .step-line { width: 1px; background: var(--border); flex: 1; margin-top: 3px; }
  .step:last-child .step-line { display: none; }
  .step-body { flex: 1; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; margin-bottom: 4px; }
  .step-body.error { border-color: rgba(239,68,68,0.3); }
  .step-header { display: flex; align-items: center; gap: 8px; margin-bottom: 0; cursor: pointer; user-select: none; }
  .step-type { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; padding: 1px 6px; border-radius: 3px; }
  .step-type.model { background: rgba(124,106,247,0.2); color: var(--accent); }
  .step-type.tool { background: rgba(59,130,246,0.2); color: var(--blue); }
  .step-type.tool.error { background: rgba(239,68,68,0.2); color: var(--red); }
  .step-type.event { background: rgba(100,116,139,0.2); color: var(--muted); }
  .step-name { font-weight: 600; font-size: 13px; flex: 1; }
  .step-dur { font-size: 11px; color: var(--muted); font-family: monospace; }
  .step-tokens { font-size: 11px; color: var(--muted); }
  .step-detail { margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; display: none; }
  .step-detail.open { display: block; }
  .step-detail pre { background: var(--bg); border-radius: 5px; padding: 8px 10px; font-size: 11px; font-family: monospace; color: var(--muted); overflow-x: auto; white-space: pre-wrap; word-break: break-all; max-height: 200px; overflow-y: auto; }
  .step-detail-label { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px; margin-top: 8px; }
  .step-detail-label:first-child { margin-top: 0; }
  .chevron { font-size: 10px; color: var(--muted); transition: transform 0.15s; }
  .chevron.open { transform: rotate(90deg); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">⚡ Tvastar UI</div>
  <div class="trace-path" id="tracePath">loading...</div>
  <div class="stat-chips" id="statChips"></div>
  <button class="refresh-btn" onclick="refresh()">↻ Refresh</button>
</header>

<div class="layout">
  <div class="run-list" id="runList">
    <div class="run-list-header">Runs</div>
    <div class="empty-list">Loading...</div>
  </div>
  <div class="detail" id="detail">
    <div class="detail-empty">
      <div class="icon">⚡</div>
      <div>Select a run to inspect</div>
    </div>
  </div>
</div>

<script>
let runs = [];
let selectedId = null;

function fmt_dur(ms) {
  if (ms == null) return '—';
  if (ms < 1000) return ms.toFixed(0) + 'ms';
  return (ms/1000).toFixed(1) + 's';
}

function fmt_time(ts) {
  if (!ts) return '—';
  const d = new Date(ts * 1000);
  return d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

function fmt_cost(input_tokens, output_tokens) {
  // rough estimate using sonnet pricing
  const usd = (input_tokens * 3 + output_tokens * 15) / 1_000_000;
  if (usd < 0.001) return '<$0.001';
  return '$' + usd.toFixed(4);
}

function status_class(run) {
  if (run.status && run.status.startsWith('error')) return 'error';
  if (run.has_warning) return 'warn';
  return 'ok';
}

async function loadRuns() {
  try {
    const r = await fetch('/api/runs');
    const data = await r.json();
    runs = data.runs || [];
    document.getElementById('tracePath').textContent = data.trace_path || '';
    renderRunList();
  } catch(e) {
    document.getElementById('runList').innerHTML =
      '<div class="run-list-header">Runs</div>' +
      '<div class="empty-list">' +
        '<div style="color:#ef4444;font-weight:600;margin-bottom:12px">⚠ Server not reachable</div>' +
        '<div style="color:#64748b;font-size:12px;line-height:1.7">Make sure the Tvastar UI server is running:<br><br>' +
        '<code style="background:#0f1117;padding:4px 8px;border-radius:4px;color:#7c6af7">tvastar ui</code><br><br>' +
        'Then open <code style="background:#0f1117;padding:2px 6px;border-radius:4px;color:#7c6af7">http://localhost:7878</code> in your browser.' +
        '</div>' +
      '</div>';
  }
}

async function loadStats() {
  try {
    const r = await fetch('/api/stats');
    const data = await r.json();
    const chips = document.getElementById('statChips');
    chips.innerHTML = `
      <div class="chip"><span>${data.total_runs}</span> runs</div>
      <div class="chip"><span>${(data.avg_steps||0).toFixed(1)}</span> avg steps</div>
      <div class="chip"><span>${data.warnings||0}</span> warnings</div>
    `;
  } catch(e) {}
}

function renderRunList() {
  const el = document.getElementById('runList');
  if (!runs.length) {
    el.innerHTML = '<div class="run-list-header">Runs</div>' +
      '<div class="empty-list">No runs found.<br><br>Run your agent with JSONLExporter to see traces here.</div>';
    return;
  }
  const items = runs.map(r => {
    const sc = status_class(r);
    const active = r.id === selectedId ? ' active' : '';
    return `
      <div class="run-item${active}" onclick="selectRun('${r.id}')">
        <div class="run-item-top">
          <div class="run-status ${sc}"></div>
          <div class="run-agent">${esc(r.agent)}</div>
          <div class="run-time">${fmt_time(r.start)}</div>
        </div>
        <div class="run-meta">
          <div class="run-meta-item">⚙ ${r.step_count} steps</div>
          <div class="run-meta-item">🔧 ${r.tool_count} tools</div>
          <div class="run-meta-item">⏱ ${fmt_dur(r.duration_ms)}</div>
          <div class="run-meta-item" style="color:${sc==='warn'?'#eab308':sc==='error'?'#ef4444':'#64748b'}">${sc==='ok'?'✓ ok':sc==='warn'?'⚠ warn':'✗ err'}</div>
        </div>
      </div>
    `;
  }).join('');
  el.innerHTML = '<div class="run-list-header">Runs (' + runs.length + ')</div>' + items;
}

async function selectRun(id) {
  selectedId = id;
  renderRunList();
  const r = await fetch('/api/runs/' + id);
  const run = await r.json();
  renderDetail(run);
}

function renderDetail(run) {
  const sc = status_class(run);
  let findingsHtml = '';
  if (run.findings && run.findings.length) {
    findingsHtml = '<div class="findings">' +
      run.findings.map(f => `
        <div class="finding ${f.severity==='ERROR'?'error':''}">
          <div class="finding-label">${esc(f.detector)} · ${esc(f.severity)}</div>
          <div class="finding-msg">${esc(f.message||'')}</div>
        </div>
      `).join('') +
      '</div>';
  }

  const stepsHtml = (run.steps || []).map((s, i) => renderStep(s, i)).join('');

  document.getElementById('detail').innerHTML = `
    <div class="run-header">
      <div class="run-header-top">
        <div>
          <div class="run-title">${esc(run.agent)}</div>
          <div class="run-id">session: ${esc(run.session)} · span: ${esc(run.id)}</div>
        </div>
        <div class="badge ${sc}">${sc==='ok'?'✓ ok':sc==='warn'?'⚠ warning':'✗ error'}</div>
      </div>
      <div class="run-stats">
        <div class="run-stat">
          <div class="run-stat-label">Duration</div>
          <div class="run-stat-value">${fmt_dur(run.duration_ms)}</div>
        </div>
        <div class="run-stat">
          <div class="run-stat-label">Steps</div>
          <div class="run-stat-value">${run.step_count}</div>
        </div>
        <div class="run-stat">
          <div class="run-stat-label">Tool calls</div>
          <div class="run-stat-value">${run.tool_count}</div>
        </div>
        <div class="run-stat">
          <div class="run-stat-label">Input tokens</div>
          <div class="run-stat-value">${(run.total_input_tokens||0).toLocaleString()}</div>
        </div>
        <div class="run-stat">
          <div class="run-stat-label">Output tokens</div>
          <div class="run-stat-value">${(run.total_output_tokens||0).toLocaleString()}</div>
        </div>
      </div>
    </div>
    ${findingsHtml}
    ${run.steps && run.steps.length ? '<div class="timeline-label">Timeline</div>' : ''}
    ${stepsHtml}
  `;
}

function renderStep(s, i) {
  const typeClass = s.type + (s.error ? ' error' : '');
  const detailId = 'detail-' + i;

  let name = '';
  let meta = '';
  let detailHtml = '';

  if (s.type === 'model') {
    name = 'Model generate';
    meta = `<span class="step-tokens">${s.input_tokens||0} in · ${s.output_tokens||0} out</span>`;
    if (s.stop_reason) {
      detailHtml = `<div class="step-detail-label">Stop reason</div><pre>${esc(s.stop_reason)}</pre>`;
    }
  } else if (s.type === 'tool') {
    name = s.tool || 'unknown tool';
    meta = s.error ? '<span style="color:#ef4444">error</span>' : '';
    const inputStr = s.input && Object.keys(s.input).length
      ? JSON.stringify(s.input, null, 2)
      : '(no input)';
    detailHtml = `
      <div class="step-detail-label">Input</div>
      <pre>${esc(inputStr)}</pre>
      ${s.result_preview ? `<div class="step-detail-label">Result preview</div><pre>${esc(s.result_preview)}</pre>` : ''}
    `;
  } else if (s.type === 'event') {
    name = s.kind;
    meta = '';
    if (s.data && Object.keys(s.data).length) {
      detailHtml = `<div class="step-detail-label">Data</div><pre>${esc(JSON.stringify(s.data, null, 2))}</pre>`;
    }
  }

  const hasDetail = detailHtml.trim().length > 0;

  return `
    <div class="step">
      <div class="step-connector">
        <div class="step-dot ${typeClass}"></div>
        <div class="step-line"></div>
      </div>
      <div class="step-body ${s.error?'error':''}">
        <div class="step-header" ${hasDetail ? `onclick="toggleDetail('${detailId}')"` : ''}>
          <span class="step-type ${typeClass}">${s.type}</span>
          <span class="step-name">${esc(name)}</span>
          ${meta}
          <span class="step-dur">${fmt_dur(s.duration_ms)}</span>
          ${hasDetail ? `<span class="chevron" id="chev-${detailId}">▶</span>` : ''}
        </div>
        ${hasDetail ? `<div class="step-detail" id="${detailId}">${detailHtml}</div>` : ''}
      </div>
    </div>
  `;
}

function toggleDetail(id) {
  const el = document.getElementById(id);
  const chev = document.getElementById('chev-' + id);
  if (el) { el.classList.toggle('open'); }
  if (chev) { chev.classList.toggle('open'); }
}

function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function refresh() {
  await Promise.all([loadRuns(), loadStats()]);
  if (selectedId) {
    const r = await fetch('/api/runs/' + selectedId);
    if (r.ok) renderDetail(await r.json());
  }
}

// Init
loadRuns();
loadStats();
// Auto-refresh every 5s
setInterval(() => { loadRuns(); loadStats(); }, 5000);
</script>
</body>
</html>
