# Internal Skill Library — machine-readable registry (single source of truth).
# Each skill is a role-agent system prompt. `owns` lists the specification/notation
# patterns the skill is the primary owner of; shared patterns are cross-referenced
# inside the skill files.
version: 1.0.0
lastReviewed: 2026-06-30

skills:
  - name: ai-engineer
    archetype: Vyasa
    folder: AI Engineer
    owner: ai-guild
    owns: [Model Contract, AI eval contract]
  - name: architect
    archetype: Vishwakarma
    folder: Architect
    owner: architecture-guild
    owns: [C4, ADR, Quality Attribute Scenarios, State Machine, Event Storming, API Contract]
  - name: business-analyst
    archetype: Vidura
    folder: Business Analyst
    owner: product-guild
    owns: [EARS, INCOSE, RFC 2119, IEEE 29148, Risk Grammar, Traceability, Accessibility (WCAG 2.2 AA), Blended Spec Template]
  - name: data-engineer
    archetype: Sahadeva
    folder: Data Engineer
    owner: data-guild
    owns: [SQL Constraint Grammar]
  - name: krishna-developer
    archetype: Krishna
    folder: Developer
    owner: engineering-guild
    owns: [Design by Contract, Pre/Post Conditions, OCL Constraints, AI Coding Checklist]
  - name: devops-platform
    archetype: Nala
    folder: DevOps Platform
    owner: platform-guild
    owns: [CI/CD Pipeline Grammar, Release Grammar, IaC/GitOps, Deployment Strategy, Rollback, Environment Parity]
  - name: documentation-engineer
    archetype: Ganesha
    folder: Documentation Engineer
    owner: docs-guild
    owns: [Record Grammar, ADR capture]
  - name: incident-responder
    archetype: Jatayu
    folder: Incident Responder
    owner: sre-guild
    owns: [Escalation Grammar, Incident Risk Grammar]
  - name: performance
    archetype: Hanuman
    folder: Performance
    owner: performance-guild
    owns: [Performance Quality Attribute Scenarios, SMART Targets]
  - name: product-manager
    archetype: Chanakya
    folder: Product Manager
    owner: product-guild
    owns: [User Story, Job Story, Use Cases, Story Mapping, INVEST, SMART, MoSCoW]
  - name: prompt-engineer
    archetype: Narada
    folder: Prompt Engineer
    owner: ai-guild
    owns: [AI Prompt Contract]
  - name: qa
    archetype: Shakuni
    folder: QA
    owner: quality-guild
    owns: [BDD, Gherkin, Decision Tables, Acceptance Criteria, AAA, Mutation Testing]
  - name: reliability
    archetype: Bhishma
    folder: Reliability
    owner: sre-guild
    owns: [Temporal Logic, Safety Patterns, FMEA, TLA+ Invariants, Resilience Patterns]
  - name: security
    archetype: Krishna + Shakuni
    folder: Security
    owner: security-guild
    owns: [Security Policy Grammar, STRIDE, OWASP Top 10 mapping]
  - name: vc-idea-validation
    archetype: Chanakya (Venture)
    folder: VC-idea-Validation
    owner: strategy-guild
    owns: [Venture Decision Grammar, Kill Criteria]
  - name: workflow-orchestrator
    archetype: Yudhishthira
    folder: Workflow Orchestrator
    owner: delivery-guild
    owns: [Workflow selection, Phase sequencing, Handoff gating, Go/No-Go decision]

# Primary handoff seams (who hands what to whom).
handoffs:
  - PM -> BA: problem definition, success criteria, constraint envelope
  - BA -> Architect: approved requirements (EARS + IDs + acceptance + compliance)
  - Architect -> Developer: contracts, component boundaries, ADRs
  - Developer -> QA: implementation + contracts to verify
  - QA -> Security: exploitable valid-path gaps
  - Architect/Reliability -> DevOps: infra requirements + SLOs to implement
  - Security -> DevOps: secrets and least-privilege policy to enforce
  - Reliability/Incident -> Documentation: runbooks to capture and keep current

# Named workflows the workflow-orchestrator composes. Each is an ordered list of
# skills; the orchestrator gates each seam with entry/exit criteria and runs
# independent steps in parallel. Skills remain independent — composition lives here.
workflows:
  new-feature: [product-manager, business-analyst, architect, devops-platform, krishna-developer, qa, security, reliability, documentation-engineer, devops-platform]
  bug-fix: [qa, krishna-developer, qa, security, devops-platform]
  production-incident: [incident-responder, reliability, krishna-developer, security, documentation-engineer]
  new-idea: [vc-idea-validation, product-manager, business-analyst]
  performance-problem: [performance, krishna-developer, qa, devops-platform]
  ai-feature: [product-manager, business-analyst, ai-engineer, prompt-engineer, krishna-developer, qa, security, reliability]
  data-pipeline: [business-analyst, data-engineer, architect, krishna-developer, qa, devops-platform]
  security-review: [security, qa, devops-platform]
